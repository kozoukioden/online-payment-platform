<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Auftrag verfolgen</title>
    <style>
        body, html {
            margin: 0;
            padding: 0;
            height: 100%;
            background-color: #111111;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            color: #ffffff;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .container {
            display: flex;
            max-width: 1100px;
            width: 90%;
            align-items: center;
            justify-content: space-between;
            gap: 50px;
        }
        .left-col {
            flex: 1;
            max-width: 480px;
        }
        .right-col {
            flex: 1;
        }
        .right-col img {
            width: 100%;
            border-radius: 12px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
            object-fit: cover;
            height: 600px;
        }

        h1 {
            font-size: 56px;
            line-height: 1.1;
            margin-bottom: 20px;
            font-weight: 800;
        }
        .pink-text {
            color: #ff9ebd;
        }
        p.desc {
            font-size: 16px;
            color: #c0c0c0;
            line-height: 1.6;
            margin-bottom: 40px;
        }

        .track-box {
            background-color: #ffffff;
            border-radius: 8px;
            padding: 30px;
            color: #000;
        }
        .track-box h3 {
            margin: 0 0 20px 0;
            font-size: 18px;
            display: flex;
            align-items: center;
            gap: 10px;
        }
        .input-group {
            display: flex;
            gap: 15px;
        }
        .input-group input {
            flex: 1;
            padding: 15px;
            border: 2px solid #333;
            border-radius: 12px;
            font-size: 16px;
            outline: none;
            transition: border-color 0.2s;
        }
        .input-group input:focus {
            border-color: #111;
        }
        .input-group button {
            background-color: #0b0b0b;
            color: #fff;
            border: none;
            padding: 0 30px;
            border-radius: 30px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            display: flex;
            align-items: center;
            gap: 10px;
            transition: background 0.2s;
        }
        .input-group button:hover {
            background-color: #222;
        }
        
        .error-msg {
            color: #d93025;
            font-size: 14px;
            margin-top: 10px;
            display: none;
            font-weight: 500;
        }

        @media (max-width: 900px) {
            .container {
                flex-direction: column;
                padding: 40px 0;
            }
            .right-col {
                display: none;
            }
            h1 {
                font-size: 40px;
            }
        }
    </style>
</head>
<body>

    <div class="container">
        <div class="left-col">
            <h1>Professionelle<br>Zahlungslösungen<br><span class="pink-text">für Ihr Business</span></h1>
            <p class="desc">
                Verwalten und verfolgen Sie Ihre Geschäftstransaktionen sicher und effizient. Geben Sie Ihre Auftragsnummer ein, um den Status Ihrer Bestellung zu überprüfen.
            </p>
            
            <div class="track-box">
                <h3>
                    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="11" cy="11" r="8"></circle><line x1="21" y1="21" x2="16.65" y2="16.65"></line></svg>
                    Auftrag verfolgen
                </h3>
                <form id="trackForm" class="input-group">
                    <input type="text" id="orderCode" placeholder="z.B. X24SA22" required>
                    <button type="submit">
                        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="5" y1="12" x2="19" y2="12"></line><polyline points="12 5 19 12 12 19"></polyline></svg>
                        Abfragen
                    </button>
                </form>
                <div id="errorMsg" class="error-msg">Auftrag nicht gefunden. Bitte überprüfen Sie den Code.</div>
            </div>
        </div>
        
        <div class="right-col">
            <!-- Uses a fashion placeholder similar to the provided screenshot -->
            <img src="https://images.unsplash.com/photo-1595950653106-6c9ebd614d3a?ixlib=rb-4.0.3&auto=format&fit=crop&w=1000&q=80" alt="Fashion">
        </div>
    </div>

    <script>
        document.getElementById('trackForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const code = document.getElementById('orderCode').value.trim();
            const errorMsg = document.getElementById('errorMsg');
            const btn = e.target.querySelector('button');
            
            if (!code) return;

            // Loading state
            btn.innerHTML = 'Lädt...';
            btn.style.opacity = '0.7';
            errorMsg.style.display = 'none';

            try {
                const res = await fetch(`/api/orders/track/${encodeURIComponent(code)}`);
                if (res.ok) {
                    const data = await res.json();
                    // Save to sessionStorage and proceed
                    sessionStorage.setItem('currentOrder', JSON.stringify(data));
                    window.location.href = 'bestellubersicht.html';
                } else {
                    errorMsg.style.display = 'block';
                    btn.innerHTML = '<svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="5" y1="12" x2="19" y2="12"></line><polyline points="12 5 19 12 12 19"></polyline></svg> Abfragen';
                    btn.style.opacity = '1';
                }
            } catch (err) {
                console.error(err);
                errorMsg.innerText = "Verbindungsfehler. Bitte versuchen Sie es später erneut.";
                errorMsg.style.display = 'block';
                btn.innerHTML = '<svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="5" y1="12" x2="19" y2="12"></line><polyline points="12 5 19 12 12 19"></polyline></svg> Abfragen';
                btn.style.opacity = '1';
            }
        });
    </script>
</body>
</html>

<script src="/chat.js"></script>
